<!DOCTYPE html>
<html>
<head>
    <title>My World</title>

    <style>
        body {
            background-color: lightblue;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: purple;
            margin-top: 50px;
        }

        .box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }

        button {
            margin-top: 50px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
        .lion {
    object-fit: contain;
    </style>

</head>

<body>

    <h1>Welcome to My World</h1>

    <div class="box-container">
        <div class="box"><img src="./parrot.jpg"></div>
        <div class="box"><img src="./lion.jpeg"></div>
        <div class="box"><img src="./monkey.jpg"></div>
    </div>

    <button>Switch</button>

</body>
</html>
