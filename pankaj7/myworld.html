<!DOCTYPE html>
<html>
<head>
    <title>My World</title>

    <style>
        body {
            background-color: lightblue;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: red;
            margin-top: 50px;
        }

        .box-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;

        }

        .box {
          
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
             border:5px solid red;  

        }

        button {
            margin-top: 100px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            width:200px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: red;
        }
        
       .box img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    

}
.text{
   
    border:2px solid black;
    background-color:orangered;
}
  
    .img{ width: 500px;
height: 500px;

}
</style>




</head>

<body>

    <h1>Welcome to My World</h1>

    <div class="box-container">
       <div class="box"><img src="./parrot.jpg"><div class="text">parrot</div></div>
        <div class="box"><img src="./lion.jpeg"><div class="text">lion</div></div>
        <div class="box"><img src="./monkey.jpg"><div class="text">monkey</div></div>
    </div>

    <button>Switch</button>

</body>
</html>
